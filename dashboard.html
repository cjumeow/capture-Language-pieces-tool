<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Pieces</title>
    <link rel="stylesheet" href="flatpickr/flatpickr.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>English Pieces</h1>
        <p class="subtitle">Collect · Review · Remember</p>
      </header>

      <div class="controls">
        <div class="control-group control-group--date">
          <label for="date-picker">Date range</label>
          <input type="text" id="date-picker" placeholder="Select dates..." />
        </div>
        <div class="control-group control-group--status">
          <label for="status-filter">Status</label>
         <select id="status-filter">
            <option value="all">All</option>
            <option value="undone">unfinished</option>
            <option value="done">finished</option>
        </select>
        </div>

        <button id="export-anki-btn" class="button-8" role="button">
          Export to Anki
        </button>
      </div>

      <main id="pieces-list" class="pieces-list">
        <div class="empty-state">
          Select a date range to review your pieces.
        </div>
      </main>
    </div>

    <script src="flatpickr/flatpickr.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
